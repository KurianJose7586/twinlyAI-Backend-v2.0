services:
  - type: web
    name: twinlyai-backend
    env: docker
    region: ohio
    plan: starter # Can be free, starter, standard, etc. 
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
      - key: ENV
        value: prod
      # The remaining secrets should be added directly in the Render dashboard,
      # but they are listed here to indicate which variables your service needs.
      - key: SESSION_SECRET_KEY
        sync: false
      - key: MONGO_CONNECTION_STRING
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: STORAGE_TYPE
        sync: false
